<!DOCTYPE html>

<html lang="es">
<head>

<title>Figuritas Road to FIFA 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Trebuchet MS',sans-serif;background:#f0f2f5;color:#111;min-height:100vh;}

/* HEADER */
#header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
#header-top{padding:10px 14px 6px;text-align:center;}
#header-top .sub{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.6);text-transform:uppercase;}
#header-top h1{font-size:16px;font-weight:900;}
#progress-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
#progress-bar-wrap{height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;}
#progress-bar{height:100%;background:linear-gradient(90deg,#86efac,#34d399);border-radius:99px;transition:width .5s;width:0%;}
#progress-wrap{max-width:340px;margin:6px auto 2px;}

/* SOBRE */
#sobre-wrap{padding:0 12px 8px;}
#sobre-btn{width:100%;padding:8px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
#sobre-box{background:rgba(255,255,255,.95);border-radius:10px;padding:10px;margin-top:6px;display:none;}
#sobre-box.open{display:block;}
#sobre-hint{font-size:12px;color:#444;margin-bottom:6px;}
#sobre-input{width:100%;padding:8px;border-radius:8px;border:2px solid #1d4ed8;font-size:15px;color:#111;min-height:60px;resize:none;outline:none;font-family:monospace;font-weight:700;}
#sobre-ok{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;background:#1d4ed8;color:#fff;font-weight:800;font-size:15px;cursor:pointer;}
#sobre-msg{margin-top:8px;font-size:12px;color:#444;padding:6px 8px;background:#f0fdf4;border-radius:6px;border:1px solid #86efac;display:none;}

/* NAV */
#nav{display:flex;border-top:1px solid rgba(255,255,255,.15);}
.nav-btn{flex:1;padding:10px 2px;background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;}
.nav-btn.active{background:rgba(255,255,255,.15);border-bottom:3px solid #fff;color:#fff;}

/* CONTENT */
#content{padding:12px;max-width:600px;margin:0 auto;}

/* TABS */
#tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:2px solid #d1d5db;background:#fff;color:#555;font-weight:700;font-size:12px;cursor:pointer;}
.tab-btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}

/* SEARCH */
#search-input{width:100%;padding:11px 14px;border-radius:12px;border:2px solid #d1d5db;background:#fff;color:#111;font-size:14px;margin-bottom:10px;outline:none;font-weight:500;}

/* CARD */
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.card-title{font-weight:800;font-size:15px;color:#111;display:flex;align-items:center;gap:8px;}
.card-flag{font-size:24px;}
.card-count{font-size:14px;font-weight:800;color:#9ca3af;}
.card-count.done{color:#16a34a;}
.card-subtitle{font-size:11px;color:#9ca3af;}

/* PROGRESS */
.bar-wrap{height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:10px;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s;background:#16a34a;}

/* FIGURITA WRAPPER */
.fig-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center;}
.fig-rep-btn{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#f97316;border:none;color:#fff;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:2;line-height:1;}
.fig-rc{position:absolute;bottom:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;pointer-events:none;}

/* FIGURITA BUTTONS */
.figs{display:flex;flex-wrap:wrap;gap:6px;}
.fig-btn{width:58px;height:68px;border-radius:10px;background:#fff;border:2px solid #e5e7eb;color:#9ca3af;cursor:pointer;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.fig-btn.tiene{background:#dcfce7;border-color:#16a34a;color:#15803d;box-shadow:0 2px 8px rgba(22,163,74,.25);}
.fig-btn .fig-num{font-size:16px;line-height:1;}
.fig-btn .fig-name{font-size:8px;color:#d1d5db;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.fig-btn.tiene .fig-name{color:#86efac;}

/* FALTANTES */
.falt-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.falt-card-title{font-weight:800;font-size:14px;color:#111;margin-bottom:8px;}
.falt-chips{display:flex;flex-wrap:wrap;gap:6px;}
.falt-chip{padding:8px 10px;border-radius:10px;font-size:13px;font-weight:700;background:#fef2f2;border:2px solid #fca5a5;color:#dc2626;cursor:pointer;min-width:50px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.falt-chip .cn{font-size:15px;font-weight:900;line-height:1;}
.falt-chip .cname{font-size:9px;color:#9ca3af;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.falt-banner{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.08);border-left:5px solid #dc2626;}
.falt-banner h2{font-size:16px;font-weight:900;color:#dc2626;}
.falt-banner p{font-size:12px;color:#888;margin-top:2px;}

/* FILTROS */
#filtros{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none;}
#filtros::-webkit-scrollbar{display:none;}
.filtro-btn{white-space:nowrap;padding:5px 12px;border-radius:20px;border:2px solid #d1d5db;background:#fff;color:#555;font-weight:700;font-size:11px;cursor:pointer;}
.filtro-btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}

/* REPETIDAS */
.rep-banner{background:#f5f3ff;border:2px solid #c4b5fd;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-weight:800;font-size:15px;color:#7c3aed;}
.rep-row{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.rep-info{}
.rep-name{font-size:14px;font-weight:700;color:#111;}
.rep-id{font-size:10px;color:#aaa;}
.rep-controls{display:flex;align-items:center;gap:8px;}
.rep-badge{background:#dc2626;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;}
.rep-minus{background:#fef2f2;border:2px solid #dc2626;color:#dc2626;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.rep-plus{background:#f0fdf4;border:2px solid #16a34a;color:#16a34a;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.empty{text-align:center;padding:48px 20px;color:#888;}
.empty .ei{font-size:44px;margin-bottom:12px;}
.empty h3{font-size:16px;font-weight:700;color:#444;}
.empty p{font-size:13px;margin-top:8px;line-height:1.7;}

/* CHIP SEARCH */
.chip-btn{padding:6px 12px;border-radius:20px;font-size:13px;background:#fff;border:2px solid #e5e7eb;color:#555;cursor:pointer;font-weight:700;}
.chip-btn.tiene{background:#dcfce7;border-color:#16a34a;color:#15803d;}
</style>

</head>

let col = JSON.parse(localStorage.getItem('p26_col') || 'null') || {...INICIAL};
let rep = JSON.parse(localStorage.getItem('p26_rep') || '{}');
let vista = 'album';
let secActiva = 'GRP_J';
let filtroGrupo = 'todos';
let sobreAbierto = false;
let longPressTimer = null;

function save() {
  localStorage.setItem('p26_col', JSON.stringify(col));
  localStorage.setItem('p26_rep', JSON.stringify(rep));
}

// Construir lista completa de figuritas
function getAllFig() {
  const all = [];
  ESP.forEach(s => s.fig.forEach((n,i) => all.push({id:`${s.id}_${i}`,nombre:n,tipo:'esp',secId:s.id,secNombre:s.nombre,secEmoji:s.emoji})));
  GRUPOS.forEach(g => g.equipos.forEach(eq => eq.jug.forEach((n,i) => all.push({
    id:`${eq.id}_${i}`,nombre:`${eq.id} ${n}`,tipo:'eq',
    equipo:eq.id,eqNombre:eq.nombre,eqEmoji:eq.emoji,eqColor:eq.color,
    grupo:g.id,gNombre:g.nombre,gColor:g.color,num:i+1
  }))));
  return all;
}
const ALL = getAllFig();
const TOTAL = ALL.length;

function stats() {
  const tengo = ALL.filter(f=>col[f.id]).length;
  const pct = Math.round(tengo/TOTAL*100);
  document.getElementById('lbl-tengo').textContent = `✅ ${tengo} tengo`;
  document.getElementById('lbl-pct').textContent = `${pct}%`;
  document.getElementById('lbl-faltan').textContent = `❌ ${TOTAL-tengo} faltan`;
  document.getElementById('progress-bar').style.width = pct+'%';
  const totalRep = Object.values(rep).reduce((a,b)=>a+b,0);
  const faltantes = ALL.filter(f=>!col[f.id]).length;
  document.getElementById('nav-faltantes').textContent = `❌ Faltan (${faltantes})`;
  document.getElementById('nav-repetidas').textContent = `🔁${totalRep>0?' ('+totalRep+')':''}`;
}

function tog(id) {
  col[id] = !col[id];
  save(); render(); stats();
}
function addR(id) {
  rep[id] = (rep[id]||0)+1;
  save(); render(); stats();
}
function rmR(id) {
  if((rep[id]||0)<=1) delete rep[id]; else rep[id]--;
  save(); render(); stats();
}

function setVista(v) {
  vista = v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if(vista==='faltantes') c.innerHTML = renderFaltantes();
  else if(vista==='album') c.innerHTML = renderAlbum();
  else if(vista==='exportar') c.innerHTML = renderExportar();
  else c.innerHTML = renderRepetidas();
  bindEvents();
}

function renderFaltantes() {
  const faltantes = ALL.filter(f=>!col[f.id]);
  const grupos = {};
  faltantes.forEach(f => {
    const k = f.grupo||f.secId||'esp';
    const nombre = f.gNombre||f.secNombre||'Especiales';
    const color = f.gColor||'#1d4ed8';
    if(!grupos[k]) grupos[k]={k,nombre,color,items:[]};
    grupos[k].items.push(f);
  });
  const gList = Object.values(grupos);

  let filtros = `<div id="filtros">
    <button class="filtro-btn ${filtroGrupo==='todos'?'active':''}" onclick="setFiltro('todos')">Todos</button>`;
  gList.forEach(g => {
    filtros += `<button class="filtro-btn ${filtroGrupo===g.k?'active':''}" onclick="setFiltro('${g.k}')">${g.nombre}</button>`;
  });
  filtros += '</div>';

  const mostrar = filtroGrupo==='todos' ? gList : gList.filter(g=>g.k===filtroGrupo);

  let cards = '';
  mostrar.forEach(g => {
    let chips = '';
    g.items.forEach(f => {
      const num = f.num||'';
      const namePart = f.nombre.replace(/^\S+ /,'').split(' ')[0]||'';
      chips += `<button class="falt-chip" data-id="${f.id}">
        <div class="cn">#${num}</div>
        <div class="cname">${namePart}</div>
      </button>`;
    });
    cards += `<div class="falt-card" style="border-left:4px solid ${g.color}">
      <div class="falt-card-title">${g.nombre} — <span style="color:#dc2626">${g.items.length} faltan</span></div>
      <div class="falt-chips">${chips}</div>
    </div>`;
  });

  return `
    <div class="falt-banner">
      <h2>❌ Te faltan ${faltantes.length} figuritas</h2>
      <p>Tocá una para marcarla como pegada</p>
    </div>
    ${filtros}${cards}`;
}

function renderAlbum() {
  let html = `<input id="search-input" type="text" placeholder="🔍 Buscar jugador o equipo..." oninput="buscar(this.value)" value="">`;

  let tabs = '<div id="tabs">';
  tabs += `<button class="tab-btn ${secActiva==='TODO'?'active':''}" onclick="setSec('TODO')">🌍 Ver todo</button>`;
  ESP.forEach(s => { tabs += `<button class="tab-btn ${secActiva===s.id?'active':''}" onclick="setSec('${s.id}')">${s.emoji} ${s.nombre.split(' ').slice(0,2).join(' ')}</button>`; });
  GRUPOS.forEach(g => { tabs += `<button class="tab-btn ${secActiva===g.id?'active':''}" onclick="setSec('${g.id}')">${g.nombre}</button>`; });
  tabs += '</div>';

  let secHtml = '';
  const ae = ESP.find(s=>s.id===secActiva);
  const ag = GRUPOS.find(g=>g.id===secActiva);
  if(secActiva==='TODO') {
    ESP.forEach(s => { secHtml += renderEsp(s); });
    GRUPOS.forEach(g => g.equipos.forEach(eq => { secHtml += renderEq(eq); }));
  } else if(ae) secHtml = renderEsp(ae);
  else if(ag) ag.equipos.forEach(eq => { secHtml += renderEq(eq); });

  return html + tabs + `<div id="sec-content">${secHtml}</div>`;
}

function figCard(id, num, name, tiene, rc) {
  if (tiene) {
    return `<div class="fig-wrap">
      <button class="fig-btn tiene" data-id="${id}">
        <span class="fig-num">${num}</span>
        <span class="fig-name">✓ ${name}</span>
      </button>
      <button class="fig-rep-btn" data-rep="${id}" title="Agregar repetida">+</button>
      ${rc>0?`<div class="fig-rc">${rc}</div>`:''}
    </div>`;
  }
  return `<div class="fig-wrap">
    <button class="fig-btn" data-id="${id}">
      <span class="fig-num">${num}</span>
      <span class="fig-name">${name}</span>
    </button>
  </div>`;
}

function renderEsp(sec) {
  const t = sec.fig.filter((_,i)=>col[`${sec.id}_${i}`]).length;
  const p = Math.round(t/sec.fig.length*100);
  let btns = '';
  sec.fig.forEach((n,i) => {
    const id=`${sec.id}_${i}`, tiene=col[id], rc=rep[id]||0;
    btns += figCard(id, i+1, n.split(' ')[0], tiene, rc);
  });
  return `<div class="card">
    <div class="card-header">
      <div class="card-title">${sec.emoji} ${sec.nombre}</div>
      <div class="card-count ${t===sec.fig.length?'done':''}">${t}/${sec.fig.length}</div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${p}%"></div></div>
    <div class="figs">${btns}</div>
  </div>`;
}

function renderEq(eq) {
  const t = eq.jug.filter((_,i)=>col[`${eq.id}_${i}`]).length;
  const p = Math.round(t/eq.jug.length*100);
  let btns = '';
  eq.jug.forEach((n,i) => {
    const id=`${eq.id}_${i}`, tiene=col[id], rc=rep[id]||0;
    const num=i+1, name=n.split(' ').slice(1,2).join('')||'';
    btns += figCard(id, num, name, tiene, rc);
  });
  return `<div class="card" style="border-left:5px solid ${eq.color}">
    <div class="card-header">
      <div class="card-title"><span class="card-flag">${eq.emoji}</span>
        <div><div style="font-size:16px">${eq.nombre}</div>
        <div class="card-subtitle">${t} de ${eq.jug.length} pegadas</div></div>
      </div>
      <div class="card-count ${t===eq.jug.length?'done':''}">${Math.round(p)}%</div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${p}%;background:${eq.color}"></div></div>
    <div class="figs">${btns}</div>
  </div>`;
}

function renderRepetidas() {
  const list = ALL.filter(f=>(rep[f.id]||0)>0);
  const tot = Object.values(rep).reduce((a,b)=>a+b,0);
  if(!list.length) return `<div class="empty"><div class="ei">🔁</div><h3>Sin repetidas todavía</h3><p>Tocá el botón <strong style="color:#f97316">+</strong> naranja<br>sobre una figurita que ya tenés</p></div>`;
  let rows = `<div class="rep-banner">🔁 ${tot} figuritas para cambiar</div>`;
  list.forEach(f => {
    rows += `<div class="rep-row">
      <div class="rep-info">
        <div class="rep-name">${f.nombre}</div>
        <div class="rep-id">${f.id}</div>
      </div>
      <div class="rep-controls">
        <button class="rep-minus" onclick="rmR('${f.id}')">−</button>
        <div class="rep-badge">${rep[f.id]}</div>
        <button class="rep-plus" onclick="addR('${f.id}')">+</button>
      </div>
    </div>`;
  });
  return rows;
}

function bindEvents() {
  // Marcar/desmarcar figurita
  document.querySelectorAll('.fig-btn[data-id]').forEach(btn => {
    btn.addEventListener('click', ()=>tog(btn.dataset.id));
  });
  // Botón repetida (+ pequeño)
  document.querySelectorAll('.fig-rep-btn[data-rep]').forEach(btn => {
    btn.addEventListener('click', e=>{ e.stopPropagation(); addR(btn.dataset.rep); });
  });
  // Faltantes chips - solo marcar
  document.querySelectorAll('.falt-chip[data-id]').forEach(btn => {
    btn.addEventListener('click', ()=>tog(btn.dataset.id));
  });
}

function setSec(id) { secActiva=id; render(); }
function setFiltro(k) { filtroGrupo=k; render(); }

function buscar(q) {
  if(q.length<2) { document.getElementById('sec-content') && (document.getElementById('sec-content').style.display=''); document.getElementById('tabs') && (document.getElementById('tabs').style.display=''); document.getElementById('search-results') && document.getElementById('search-results').remove(); return; }
  const ql=q.toLowerCase();
  const res = ALL.filter(f=>f.nombre.toLowerCase().includes(ql)||f.id.toLowerCase().includes(ql)||(f.eqNombre||'').toLowerCase().includes(ql));
  let chips='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
  res.forEach(f=>{
    const tiene=col[f.id];
    chips+=`<button class="chip-btn ${tiene?'tiene':''}" data-id="${f.id}">${tiene?'✓ ':''}${f.nombre}</button>`;
  });
  chips+='</div>';
  let el=document.getElementById('search-results');
  if(!el){el=document.createElement('div');el.id='search-results';document.getElementById('sec-content').parentNode.insertBefore(el,document.getElementById('sec-content'));}
  el.innerHTML=`<div style="font-size:12px;color:#888;margin-bottom:4px">${res.length} resultados</div>`+chips;
  document.getElementById('sec-content').style.display='none';
  document.getElementById('tabs').style.display='none';
  el.querySelectorAll('.chip-btn[data-id]').forEach(btn=>{
    const id=btn.dataset.id;
    btn.addEventListener('click',()=>tog(id));
  });
}

function toggleSobre() {
  sobreAbierto = !sobreAbierto;
  document.getElementById('sobre-box').className = sobreAbierto?'sobre-open':'';
  document.getElementById('sobre-box').style.display = sobreAbierto?'block':'none';
  document.getElementById('sobre-btn').textContent = sobreAbierto?'✕ Cerrar':'📦 Abrir sobre nuevo';
}

function procesarSobre() {
  const input = document.getElementById('sobre-input').value.toUpperCase();
  const tokens = input.split(/[\s,;\/\n]+/).filter(Boolean);
  const marcadas=[], noEnc=[];
  let i=0;
  while(i<tokens.length) {
    let found=false;
    if(i+1<tokens.length && !isNaN(tokens[i+1])) {
      const candidate=`${tokens[i]}_${parseInt(tokens[i+1])-1}`;
      if(ALL.find(f=>f.id===candidate)) {
        if(!col[candidate]) col[candidate]=true; else rep[candidate]=(rep[candidate]||0)+1;
        marcadas.push(`${tokens[i]} ${tokens[i+1]}`);
        i+=2; found=true;
      }
    }
    if(!found){ noEnc.push(tokens[i]); i++; }
  }
  save(); stats(); render();
  const msg = document.getElementById('sobre-msg');
  msg.style.display='block';
  msg.textContent = marcadas.length>0
    ? `✅ ${marcadas.join(', ')}${noEnc.length?' | ⚠️ No encontré: '+noEnc.join(', '):''}` 
    : '⚠️ No encontré ninguna. Usá: ARG 17 ENG 5';
  document.getElementById('sobre-input').value='';
}

function renderExportar() {
  const faltantes = ALL.filter(f=>!col[f.id]);
  const grupos = {};
  faltantes.forEach(f => {
    const k = f.eqNombre||f.secNombre||'Especiales';
    const emoji = f.eqEmoji||f.secEmoji||'📋';
    if(!grupos[k]) grupos[k]={nombre:k,emoji,items:[]};
    grupos[k].items.push(f.nombre.replace(/^\S+ /,''));
  });

  let texto = '⚽ FIGURITAS QUE ME FALTAN\nRoad to FIFA World Cup 2026\n';
  texto += '─────────────────────\n';
  Object.values(grupos).forEach(g => {
    texto += `\n${g.emoji} ${g.nombre}:\n`;
    texto += g.items.map(i=>`  • ${i}`).join('\n') + '\n';
  });
  texto += `\n─────────────────────\nTotal: ${faltantes.length} figuritas`;

  return `
    <div class="card" style="margin-bottom:12px">
      <div style="font-weight:900;font-size:16px;margin-bottom:4px">📤 Exportar lista de faltantes</div>
      <div style="font-size:12px;color:#888;margin-bottom:12px">${faltantes.length} figuritas · Para compartir o imprimir</div>
      <button onclick="compartirWhatsApp()" style="width:100%;padding:12px;border-radius:10px;border:none;background:#25D366;color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:8px">
        📱 Compartir por WhatsApp
      </button>
      <button onclick="imprimirLista()" style="width:100%;padding:12px;border-radius:10px;border:none;background:#1d4ed8;color:#fff;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:8px">
        🖨️ Imprimir / Guardar PDF
      </button>
      <button onclick="copiarLista()" style="width:100%;padding:12px;border-radius:10px;border:2px solid #d1d5db;background:#fff;color:#111;font-weight:700;font-size:14px;cursor:pointer">
        📋 Copiar texto
      </button>
    </div>
    <div class="card" style="white-space:pre-wrap;font-size:12px;font-family:monospace;color:#333;line-height:1.8" id="lista-texto">${texto}</div>`;
}

function getTextoFaltantes() {
  const faltantes = ALL.filter(f=>!col[f.id]);
  const grupos = {};
  faltantes.forEach(f => {
    const k = f.eqNombre||f.secNombre||'Especiales';
    const emoji = f.eqEmoji||f.secEmoji||'📋';
    if(!grupos[k]) grupos[k]={nombre:k,emoji,items:[]};
    grupos[k].items.push(f.nombre.replace(/^\S+ /,''));
  });
  let texto = '⚽ FIGURITAS QUE ME FALTAN\nRoad to FIFA World Cup 2026\n─────────────────────\n';
  Object.values(grupos).forEach(g => {
    texto += `\n${g.emoji} ${g.nombre}:\n`;
    texto += g.items.map(i=>`  • ${i}`).join('\n') + '\n';
  });
  texto += `\n─────────────────────\nTotal: ${faltantes.length} figuritas`;
  return texto;
}

function compartirWhatsApp() {
  const texto = getTextoFaltantes();
  window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
}

function copiarLista() {
  const texto = getTextoFaltantes();
  navigator.clipboard.writeText(texto).then(()=>{
    alert('✅ Lista copiada!');
  }).catch(()=>{
    const el = document.getElementById('lista-texto');
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    alert('Seleccioná el texto y copiá manualmente');
  });
}

function imprimirLista() {
  const texto = getTextoFaltantes();
  const win = window.open('', '_blank');
  win.document.write(`<html><head><title>Figuritas que faltan</title>
  <style>body{font-family:monospace;font-size:14px;padding:20px;white-space:pre-wrap;line-height:1.8}
  @media print{button{display:none}}</style></head>

  <body>${texto.replace(/\n/g,'<br>')}
  <br><br><button onclick="window.print()">🖨️ Imprimir</button>
  </body></html>`);
  win.document.close();
}
